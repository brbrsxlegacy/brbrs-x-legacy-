<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Battle Arena</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #1f1f1f, #000);
      z-index: -1;
      opacity: 0.7;
    }

    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 28px;
      letter-spacing: 1px;
    }

    .scoreboard {
      display: flex;
      gap: 20px;
      font-size: 18px;
      font-weight: 600;
    }

    .game-container {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 0 16px;
    }

    canvas {
      border-radius: 12px;
      background: #111;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.08);
      max-width: 100%;
      height: auto;
    }

    .controls {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 30px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 10px 24px rgba(255, 75, 43, 0.25);
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 16px 30px rgba(255, 75, 43, 0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    .info {
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      text-align: center;
      line-height: 1.5;
    }

    footer {
      margin-top: auto;
      padding: 20px;
      opacity: 0.7;
      text-align: center;
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        gap: 12px;
        padding: 18px 20px;
        text-align: center;
      }

      h1 {
        font-size: 24px;
      }

      .scoreboard {
        font-size: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <header class="topbar">
    <h1>🤖 AI Battle Arena</h1>

    <div class="scoreboard">
      <div>Score: <span id="score">0</span></div>
      <div>Level: <span id="level">1</span></div>
    </div>
  </header>

  <main class="game-container">
    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="controls">
      <button id="startBtn">START GAME</button>
      <button id="restartBtn">RESTART</button>
    </div>

    <p class="info">
      Hareket: W A S D veya yön tuşları<br />
      Amaç: Kırmızı düşmana yakalanmadan ona dokunup puan kazanmak
    </p>
  </main>

  <footer>
    <p>AI Game Engine Demo • UI/UX Modern Design</p>
  </footer>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");

    let score = 0;
    let level = 1;
    let animationId = null;
    let gameStarted = false;

    const player = {
      x: 100,
      y: 250,
      size: 20,
      speed: 5,
      color: "#00e5ff"
    };

    const enemy = {
      x: 700,
      y: 250,
      size: 20,
      speed: 2,
      color: "#ff0033"
    };

    const keys = {};

    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key] = false;
    });

    function clampPlayer() {
      if (player.x < player.size) player.x = player.size;
      if (player.x > canvas.width - player.size) player.x = canvas.width - player.size;
      if (player.y < player.size) player.y = player.size;
      if (player.y > canvas.height - player.size) player.y = canvas.height - player.size;
    }

    function randomEnemyPosition() {
      enemy.x = Math.random() * (canvas.width - enemy.size * 2) + enemy.size;
      enemy.y = Math.random() * (canvas.height - enemy.size * 2) + enemy.size;
    }

    function resetPositions() {
      player.x = 100;
      player.y = 250;
      enemy.x = 700;
      enemy.y = 250;
    }

    function movePlayer() {
      if (keys["w"] || keys["W"] || keys["ArrowUp"]) player.y -= player.speed;
      if (keys["s"] || keys["S"] || keys["ArrowDown"]) player.y += player.speed;
      if (keys["a"] || keys["A"] || keys["ArrowLeft"]) player.x -= player.speed;
      if (keys["d"] || keys["D"] || keys["ArrowRight"]) player.x += player.speed;

      clampPlayer();
    }

    function enemyAI() {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 1) {
        enemy.x += (dx / dist) * enemy.speed;
        enemy.y += (dy / dist) * enemy.speed;
      }
    }

    function collision() {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < player.size + enemy.size) {
        score++;
        randomEnemyPosition();

        if (score % 5 === 0) {
          level++;
          enemy.speed += 0.5;
        }

        updateUI();
      }
    }

    function updateUI() {
      scoreEl.textContent = score;
      levelEl.textContent = level;
    }

    function drawArena() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;

      for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      for (let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawPlayer() {
      ctx.fillStyle = player.color;
      ctx.shadowBlur = 20;
      ctx.shadowColor = player.color;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawEnemy() {
      ctx.fillStyle = enemy.color;
      ctx.shadowBlur = 20;
      ctx.shadowColor = enemy.color;
      ctx.beginPath();
      ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawHudText() {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.font = "16px Segoe UI";
      ctx.fillText("Mavi = Oyuncu", 20, 30);
      ctx.fillText("Kırmızı = Hedef", 20, 52);
    }

    function gameLoop() {
      drawArena();
      movePlayer();
      enemyAI();
      collision();
      drawPlayer();
      drawEnemy();
      drawHudText();

      animationId = requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener("click", () => {
      if (gameStarted) return;
      gameStarted = true;
      gameLoop();
    });

    restartBtn.addEventListener("click", () => {
      score = 0;
      level = 1;
      enemy.speed = 2;
      updateUI();
      resetPositions();
      drawArena();
      drawPlayer();
      drawEnemy();
      drawHudText();

      if (!gameStarted) {
        gameStarted = true;
        gameLoop();
      }
    });

    updateUI();
    drawArena();
    drawPlayer();
    drawEnemy();
    drawHudText();
  </script>
</body>
</html>
